<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VOD Cinema</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Tahoma,sans-serif;
}

header{
    background:#111;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

nav a:hover{
    color:#ff3d00;
}

.hero{
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(to bottom,#111,#000);
}

.hero h1{
    margin-bottom:10px;
}

.search-box{
    text-align:center;
    margin:20px;
}

.search-box input{
    width:80%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:8px;
}

.section-title{
    padding:0 20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1c1c1c;
    border-radius:12px;
    padding:15px;
    text-decoration:none;
    color:white;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#333;
}

.card h3{
    margin-top:0;
}

.card p{
    color:#aaa;
    font-size:13px;
}

</style>
</head>

<body>

<header>

<div class="logo">
🎬 VOD Cinema
</div>

<nav>
<a href="index.html">خانه</a>
<a href="#">فیلم‌ها</a>
<a href="#">سریال‌ها</a>
<a href="#">دسته‌بندی</a>
<a href="#">درباره ما</a>
</nav>

</header>

<section class="hero">

<h1>🎬 فیلم ویژه هفته</h1>

<h2>Big Buck Bunny</h2>

<p>
تماشای آنلاین رایگان فیلم و سریال
</p>

<a href="movie.html?id=bunny" class="watch-btn">
▶ تماشای فیلم
</a>

</section>
<div class="search-box">
<input id="search" placeholder="🔍 جستجوی فیلم">
</div>

<h2 class="section-title">فیلم‌های موجود</h2>

<div class="grid" id="movies"></div>

<script>

fetch("data/movies.json")
.then(res => res.json())
.then(data => {

const container = document.getElementById("movies");

data.forEach(movie => {

const card = document.createElement("a");

card.className = "card";
card.href = "movie.html?id=" + movie.id;

card.innerHTML = `
<img src="${movie.poster}" class="poster">

<h3>${movie.title}</h3>

<p>${movie.desc}</p>
`;

container.appendChild(card);

});

const search = document.getElementById("search");

search.addEventListener("input", function(){

const value = this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card => {

card.style.display =
card.innerText.toLowerCase().includes(value)
? "block"
: "none";

});

});

});

</script>

</body>
</html>
