<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Movie</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

video{
  width:90%;
  max-width:800px;
  margin-top:20px;
  border-radius:10px;
}

.container{
  padding:20px;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">Loading...</h1>

<video controls id="player"></video>

<p id="desc"></p>

</div>

<script>
const id=new URLSearchParams(window.location.search).get("id");

fetch("data/movies.json")
.then(r=>r.json())
.then(data=>{

  const movie=data.find(m=>m.id===id);

  if(!movie){
    document.getElementById("title").innerText="Not Found";
    return;
  }

  document.getElementById("title").innerText=movie.title;
  document.getElementById("desc").innerText=movie.desc;
  document.getElementById("player").src=movie.video;

});
</script>

</body>
</html>
