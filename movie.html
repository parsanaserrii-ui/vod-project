<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Movie Player</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#0b0b0b;
      color:white;
      text-align:center;
    }

    video{
      width:90%;
      max-width:800px;
      margin-top:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1 id="title">Loading...</h1>

<video controls id="player"></video>

<p id="desc"></p>

<script>
const id = new URLSearchParams(window.location.search).get("id");

fetch("data/movies.json")
.then(res => res.json())
.then(data => {

  const movie = data.find(m => m.id === id);

  if(!movie){
    document.getElementById("title").innerText = "Movie not found";
    return;
  }

  document.getElementById("title").innerText = movie.title;
  document.getElementById("desc").innerText = movie.desc;

  document.getElementById("player").src = movie.video;

});
</script>

</body>
</html>
