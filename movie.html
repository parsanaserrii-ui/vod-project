<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Movie Player</title>
</head>

<body style="background:black;color:white;text-align:center;">

<h1 id="title">Loading...</h1>

<video id="player" controls width="80%" style="margin-top:20px"></video>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const movies = {
  sintel: {
    title: "Sintel",
    video: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4"
  },
  bunny: {
    title: "Big Buck Bunny",
    video: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
  }
};

if (movies[id]) {
  document.getElementById("title").innerText = movies[id].title;

  const video = document.getElementById("player");

  // مهم: این روش مطمئن‌تره از src مستقیم
  video.innerHTML = `
    <source src="${movies[id].video}" type="video/mp4">
  `;

  video.load();
} 
else {
  document.getElementById("title").innerText = "Movie not found";
}
</script>

</body>
</html>
